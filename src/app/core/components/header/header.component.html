<!-- src/app/core/components/header/header.component.html -->
<nav class="navbar navbar-expand-lg bg-navy fixed-top" *ngIf="isBrowser && authService.isAuthenticated()">
    <div class="container">
    <a class="navbar-brand text-white fw-bold" routerLink="/surveys">
      <i class="bi bi-file-earmark-text-fill text-orange me-2"></i>
      SurveyManager
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/surveys" routerLinkActive="active">
            <i class="bi bi-files me-1"></i> Surveys
          </a>
        </li>
        <li class="nav-item" *ngIf="authService.isAdmin()">
          <a class="nav-link text-white" routerLink="/sessions" routerLinkActive="active">
            <i class="bi bi-calendar-event me-1"></i> Sessions
          </a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i> {{ (authService.getCurrentUser()?.username) || 'User' }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" (click)="logout()" style="cursor: pointer;">
              <i class="bi bi-box-arrow-right me-1"></i> Déconnexion
            </a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Ajouter un padding-top pour compenser le header fixe -->
<div style="padding-top: 70px;" *ngIf="isBrowser && authService.isAuthenticated()"></div>
