<div class="card border-0 shadow-sm mb-3">
  <div class="card-header bg-navy text-white d-flex align-items-center border-0 rounded-top">
    <i class="bi bi-folder-plus me-2" style="font-size: 1.25rem;"></i>
    <h4 class="mb-0">Nouvelle Section</h4>
  </div>
  <div class="card-body bg-white">
    <form [formGroup]="sectionForm" (ngSubmit)="onSubmit()">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold">
            Code <span class="text-orange">*</span>
          </label>
          <input type="text" 
                 class="form-control" 
                 formControlName="code"
                 [class.is-invalid]="sectionForm.get('code')?.invalid && sectionForm.get('code')?.touched"
                 placeholder="Ex: SEC_001">
          <div class="invalid-feedback" *ngIf="sectionForm.get('code')?.invalid && sectionForm.get('code')?.touched">
            Le code est requis
          </div>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">
            Titre FR <span class="text-orange">*</span>
          </label>
          <input type="text" 
                 class="form-control" 
                 formControlName="title"
                 [class.is-invalid]="sectionForm.get('title')?.invalid && sectionForm.get('title')?.touched"
                 placeholder="Ex: Informations personnelles">
          <div class="invalid-feedback" *ngIf="sectionForm.get('title')?.invalid && sectionForm.get('title')?.touched">
            Le titre est requis
          </div>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">
            <i class="bi bi-translate me-1 text-orange"></i>Titre EN
          </label>
          <input type="text" 
                 class="form-control" 
                 formControlName="titleEn"
                 placeholder="Ex: Personal information">
        </div>
      </div>

      <div class="row g-3 mt-2">
        <div class="col-md-6">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="conditionnel" formControlName="conditionnel">
            <label class="form-check-label" for="conditionnel">
              <i class="bi bi-diagram-3 text-orange me-1"></i>
              Section conditionnelle
            </label>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">
            <i class="bi bi-sort-numeric-down me-1 text-orange"></i>Ordre
          </label>
          <input type="number" 
                 class="form-control" 
                 formControlName="ordre"
                 placeholder="Ex: 1">
        </div>
      </div>

      <div class="d-flex justify-content-end mt-4 pt-2 border-top">
        <button type="submit" class="btn btn-orange" [disabled]="sectionForm.invalid">
          <i class="bi bi-plus-circle me-1"></i> Ajouter la section
        </button>
      </div>
    </form>
  </div>
</div>
