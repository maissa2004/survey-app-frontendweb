<div class="container mt-4">
   <!-- Message de chargement -->
  <div *ngIf="loading" class="alert alert-info text-center">
    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
    Chargement...
  </div>
  <div class="card">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">{{ isEditMode ? 'Modifier' : 'Créer' }} un Survey</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="surveyForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Code *</label>
            <input type="text" 
                   class="form-control" 
                   [class.is-invalid]="surveyForm.get('code')?.invalid && surveyForm.get('code')?.touched"
                   formControlName="code">
            <div class="invalid-feedback" *ngIf="surveyForm.get('code')?.invalid && surveyForm.get('code')?.touched">
              Le code est requis
            </div>
          </div>
          
          <div class="col-md-6 mb-3">
            <label class="form-label">Libellé FR *</label>
            <input type="text" 
                   class="form-control"
                   [class.is-invalid]="surveyForm.get('libelle')?.invalid && surveyForm.get('libelle')?.touched"
                   formControlName="libelle">
            <div class="invalid-feedback" *ngIf="surveyForm.get('libelle')?.invalid && surveyForm.get('libelle')?.touched">
              Le libellé est requis
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label">Libellé EN</label>
            <input type="text" class="form-control" formControlName="libelleEn">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="isValid" formControlName="isValid">
              <label class="form-check-label" for="isValid">Actif</label>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="isFormReference" formControlName="isFormReference">
              <label class="form-check-label" for="isFormReference">Formulaire de référence</label>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-3">
          <a routerLink="/surveys" class="btn btn-secondary me-2">
            Annuler
          </a>
          <button type="submit" class="btn btn-primary" [disabled]="surveyForm.invalid">
            {{ isEditMode ? 'Mettre à jour' : 'Créer' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
