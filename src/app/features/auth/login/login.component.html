<!-- src/app/features/auth/login/login.component.html -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-lg">
        <div class="card-header bg-navy text-white text-center border-0 rounded-top">
          <h3 class="mb-0">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Connexion
          </h3>
        </div>
        <div class="card-body p-4">
          <div *ngIf="error" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            {{ error }}
          </div>
          
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-person me-1 text-orange"></i>
                Nom d'utilisateur / Email / Téléphone
              </label>
              <input type="text" 
                     class="form-control" 
                     [class.is-invalid]="loginForm.get('login')?.invalid && loginForm.get('login')?.touched"
                     formControlName="login"
                     placeholder="Ex: admin / admin@example.com / 0612345678">
              <div class="invalid-feedback">Ce champ est requis</div>
            </div>
            
            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="bi bi-lock me-1 text-orange"></i>
                Mot de passe
              </label>
              <input type="password" 
                     class="form-control"
                     [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                     formControlName="password"
                     placeholder="Votre mot de passe">
              <div class="invalid-feedback">Ce champ est requis</div>
            </div>
            
            <button type="submit" class="btn btn-orange w-100 py-2" [disabled]="loginForm.invalid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              <i class="bi bi-box-arrow-in-right me-2" *ngIf="!loading"></i>
              Se connecter
            </button>
          </form>
          
          <div class="text-center mt-3">
            <small class="text-muted">
              Pas encore de compte ? 
              <a routerLink="/register" class="text-orange text-decoration-none">S'inscrire</a>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
