
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-lg">
        <div class="card-header bg-navy text-white text-center border-0 rounded-top">
          <h3 class="mb-0">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Connexion
          </h3>
          <small class="text-white-50">Application web d'administration</small>
        </div>
        <div class="card-body p-4">
          <div *ngIf="error" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            {{ error }}
          </div>
          
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-person me-1 text-orange"></i>
                Nom d'utilisateur
              </label>
              <input type="text" 
                     class="form-control" 
                     formControlName="login"
                     placeholder="Entrez votre nom d'utilisateur">
            </div>
            
            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="bi bi-lock me-1 text-orange"></i>
                Mot de passe
              </label>
              <input type="password" 
                     class="form-control"
                     formControlName="password"
                     placeholder="Entrez votre mot de passe">
            </div>
            
            <button type="submit" class="btn btn-orange w-100 py-2" [disabled]="loginForm.invalid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              <i class="bi bi-box-arrow-in-right me-2" *ngIf="!loading"></i>
              Se connecter
            </button>
          </form>
          
          <div class="text-center mt-3">
            <small class="text-muted">
              <i class="bi bi-shield-lock me-1"></i>
              Accès réservé aux administrateurs
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
